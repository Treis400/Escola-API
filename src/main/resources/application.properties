# =========================
# Banco de Dados H2 (em memoria)
# =========================
spring.datasource.url=jdbc:h2:mem:escoladb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console H2 disponivel em http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =========================
# JPA / Hibernate
# =========================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Garante que data.sql seja executado APOS o Hibernate criar as tabelas
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# =========================
# Servidor
# =========================
server.port=8080
